name: Publish Dry-run

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+-[0-9A-Za-z]+'
  
jobs:
  publish-dry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo login
      - run: cargo publish --dry-run
