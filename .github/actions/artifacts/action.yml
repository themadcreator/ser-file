name: Upload Artifacts
description: Upload Crate Examples as Artifacts
inputs:
  name:
    description: Name of the artifact
    required: true
  target:
    description: Cargo build target
    required: true
  file_regex:
    description: Regular expression to match artifact files in the build directory
    required: true
  artifacts:
    description: Temporary artifacts path
    required: true
    default: 'target/artifacts'
runs:
  using: composite
  steps:
      - run: mkdir -p ${{ inputs.artifacts }}
        shell: bash
      - run: find target/${{ inputs.target }}/release/ -type f -regextype posix-extended -regex '${{ inputs.file_regex }}' -exec cp {} ${{ inputs.artifacts }}/. \;
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.name }}
          path: ${{ inputs.artifacts }}/*
